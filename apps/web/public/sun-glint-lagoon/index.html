<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sun Glint Lagoon</title>
    <script type="module" crossorigin src="/sun-glint-lagoon/assets/index-DhKDveiH.js"></script>
    <link rel="stylesheet" crossorigin href="/sun-glint-lagoon/assets/index-DdOKYxt_.css" />
  </head>
  <body>
    <main class="stage" aria-label="太阳直射水面实验">
      <canvas id="scene" aria-label="Three.js 太阳直射水面"></canvas>

      <section class="controls" aria-label="太阳和水面参数">
        <label>
          <span>高度</span>
          <input id="elevationControl" type="range" min="1" max="22" step="0.1" value="7.4" />
          <output id="elevationValue" for="elevationControl">7.4</output>
        </label>
        <label>
          <span>方位</span>
          <input id="azimuthControl" type="range" min="-80" max="20" step="0.1" value="-27" />
          <output id="azimuthValue" for="azimuthControl">-27</output>
        </label>
        <label>
          <span>日照</span>
          <input id="sunControl" type="range" min="0" max="2" step="0.01" value="1.08" />
          <output id="sunValue" for="sunControl">1.08</output>
        </label>
        <label>
          <span>碎光</span>
          <input id="sparkleControl" type="range" min="0" max="1.5" step="0.01" value="0.62" />
          <output id="sparkleValue" for="sparkleControl">0.62</output>
        </label>
        <label>
          <span>波动</span>
          <input id="waveControl" type="range" min="0" max="1" step="0.01" value="0.46" />
          <output id="waveValue" for="waveControl">0.46</output>
        </label>
      </section>
    </main>
  </body>
</html>
