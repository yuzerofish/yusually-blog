<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>问答静默旧版 Demo</title>
  <style>
    :root {
      color-scheme: dark;
      --bg-default: #101923;
      --bg-focus: #14212C;
      --bg-recording: #172A36;
      --text-main: rgba(239, 243, 236, 0.9);
      --text-answer: rgba(226, 234, 226, 0.78);
      --edge-left: max(38px, env(safe-area-inset-left));
      --edge-right: max(38px, env(safe-area-inset-right));
      --content-width: min(760px, calc(100vw - var(--edge-left) - var(--edge-right)));
      font-family: "Songti SC", "Noto Serif SC", "LXGW WenKai", serif;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      min-height: 100%;
      margin: 0;
      overflow: hidden;
      background: var(--bg-default);
      color: var(--text-main);
      font-family: "Songti SC", "Noto Serif SC", "LXGW WenKai", serif;
      letter-spacing: 0;
    }

    body {
      transition: background-color 360ms ease;
    }

    body.is-focused {
      background: var(--bg-focus);
    }

    body.is-recording {
      background: var(--bg-recording);
    }

    body.is-completing {
      background: var(--bg-default);
    }

    button,
    textarea {
      font: inherit;
    }

    .surface {
      position: fixed;
      inset: 0;
      min-height: 100vh;
      min-height: 100dvh;
      background: transparent;
    }

    .question-zone,
    .answer-zone {
      position: absolute;
      left: 50%;
      width: var(--content-width);
      transform: translateX(-50%);
      transition:
        opacity 780ms ease,
        filter 780ms ease;
    }

    .question-zone {
      top: 34vh;
      top: 34dvh;
      height: 12vh;
      height: 12dvh;
      display: flex;
      align-items: flex-start;
    }

    .question-text {
      width: 100%;
      margin: 0;
      color: var(--text-main);
      font-size: 32px;
      font-weight: 400;
      line-height: 1.72;
      word-break: break-word;
      overflow-wrap: anywhere;
      text-wrap: pretty;
    }

    .question-char {
      display: inline-block;
      opacity: 0;
      filter: blur(4px);
      animation: questionCharIn 700ms cubic-bezier(0.16, 1, 0.3, 1) forwards;
      animation-delay: var(--delay, 0ms);
      will-change: opacity, filter;
    }

    .question-space {
      width: 0.48em;
    }

    .answer-zone {
      top: 58vh;
      top: 58dvh;
      height: 16vh;
      height: 16dvh;
    }

    .answer-input {
      display: block;
      width: 100%;
      height: 100%;
      min-height: 100%;
      padding: 0 58px 48px 0;
      border: 0;
      outline: 0;
      resize: none;
      overflow: hidden;
      background: transparent;
      color: var(--text-answer);
      caret-color: rgba(234, 241, 232, 0.72);
      font-size: 27px;
      font-weight: 400;
      line-height: 1.82;
      word-break: break-word;
      overflow-wrap: anywhere;
      appearance: none;
    }

    .answer-input::selection {
      background: rgba(224, 236, 230, 0.22);
      color: rgba(248, 251, 246, 0.96);
    }

    .answer-input:disabled {
      opacity: 1;
      -webkit-text-fill-color: var(--text-answer);
    }

    .voice-button {
      position: absolute;
      right: 0;
      bottom: 0;
      display: grid;
      width: 42px;
      height: 42px;
      padding: 0;
      place-items: center;
      border: 0;
      border-radius: 50%;
      background: transparent;
      color: rgba(205, 220, 220, 0.28);
      cursor: pointer;
      transition:
        color 240ms ease,
        opacity 240ms ease,
        transform 240ms ease;
    }

    .voice-button svg {
      width: 21px;
      height: 21px;
      stroke-width: 1.55;
    }

    .voice-button:hover {
      color: rgba(215, 228, 228, 0.4);
    }

    .voice-button:focus-visible {
      outline: 1px solid rgba(215, 228, 228, 0.28);
      outline-offset: 4px;
    }

    body.is-recording .voice-button {
      color: rgba(222, 238, 238, 0.58);
      transform: translateY(-1px);
    }

    .surface.is-locked {
      pointer-events: none;
      user-select: none;
    }

    .surface.is-fading .question-zone,
    .surface.is-fading .answer-zone,
    .surface.is-blank .question-zone,
    .surface.is-blank .answer-zone {
      opacity: 0;
      filter: blur(6px);
    }

    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    @keyframes questionCharIn {
      from {
        opacity: 0;
        filter: blur(4px);
      }

      to {
        opacity: 1;
        filter: blur(0);
      }
    }

    @media (max-width: 640px) {
      .question-text {
        font-size: 24px;
        line-height: 1.76;
      }

      .answer-input {
        padding-right: 50px;
        font-size: 22px;
        line-height: 1.84;
      }

      .voice-button {
        width: 40px;
        height: 40px;
      }
    }

    @media (max-height: 680px) {
      .question-text {
        font-size: 24px;
        line-height: 1.58;
      }

      .answer-input {
        font-size: 21px;
        line-height: 1.58;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      body,
      .question-zone,
      .answer-zone,
      .voice-button {
        transition-duration: 1ms;
      }

      .question-char {
        opacity: 1;
        filter: blur(0);
        animation: none;
      }
    }
  </style>
</head>
<body>
  <main class="surface" aria-live="polite">
    <section class="question-zone" aria-label="问题">
      <p class="question-text" id="questionText"></p>
    </section>

    <section class="answer-zone" aria-label="回答">
      <label class="sr-only" for="answerInput">回答</label>
      <textarea
        class="answer-input"
        id="answerInput"
        autocomplete="off"
        autocapitalize="off"
        spellcheck="false"
        rows="3"></textarea>
      <button class="voice-button" id="voiceButton" type="button" aria-label="语音输入" aria-pressed="false">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M12 3a3 3 0 0 0-3 3v6a3 3 0 0 0 6 0V6a3 3 0 0 0-3-3Z"></path>
          <path d="M19 10v2a7 7 0 0 1-14 0v-2"></path>
          <path d="M12 19v2"></path>
        </svg>
      </button>
    </section>
  </main>

  <script>
    const questions = [
      "如果你今天已经财富自由，你还会继续做现在这件事吗？",
      "你最不敢承认的那个渴望，正在让你付出什么代价？",
      "明天早上，财富自由后的你会先删掉哪一个消耗？"
    ];

    const body = document.body;
    const surface = document.querySelector(".surface");
    const questionText = document.getElementById("questionText");
    const answerInput = document.getElementById("answerInput");
    const voiceButton = document.getElementById("voiceButton");
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

    let questionIndex = 0;
    let locked = false;
    let recognition = null;
    let recognizing = false;
    let fallbackTimer = null;
    let recordingStartedAt = 0;
    let voiceBaseText = "";

    function randomDelay() {
      return 48 + Math.floor(Math.random() * 25);
    }

    function renderQuestion(text) {
      questionText.textContent = "";
      let delay = 0;

      for (const char of Array.from(text)) {
        const span = document.createElement("span");
        span.className = char.trim() ? "question-char" : "question-char question-space";
        span.textContent = char.trim() ? char : "\u00a0";
        span.style.setProperty("--delay", `${delay}ms`);
        questionText.appendChild(span);
        delay += randomDelay();
      }
    }

    function refreshFocusState() {
      const isAnswerFocused = document.activeElement === answerInput;
      body.classList.toggle("is-focused", isAnswerFocused && !locked && !recognizing);
    }

    function setRecordingState(active) {
      recognizing = active;
      if (active) {
        recordingStartedAt = Date.now();
      }
      body.classList.toggle("is-recording", active && !locked);
      voiceButton.setAttribute("aria-pressed", active ? "true" : "false");
      refreshFocusState();
    }

    function finishRecordingState() {
      const minimumVisibleMs = 900;
      const remaining = Math.max(0, minimumVisibleMs - (Date.now() - recordingStartedAt));
      window.clearTimeout(fallbackTimer);
      fallbackTimer = window.setTimeout(() => setRecordingState(false), remaining);
    }

    function buildRecognition() {
      if (!SpeechRecognition) {
        return null;
      }

      const instance = new SpeechRecognition();
      instance.lang = "zh-CN";
      instance.continuous = true;
      instance.interimResults = true;

      instance.onstart = () => setRecordingState(true);
      instance.onend = finishRecordingState;
      instance.onerror = finishRecordingState;
      instance.onresult = (event) => {
        let transcript = "";
        for (let i = 0; i < event.results.length; i += 1) {
          transcript += event.results[i][0].transcript;
        }

        const spacer = voiceBaseText && transcript ? "\n" : "";
        answerInput.value = `${voiceBaseText}${spacer}${transcript}`;
      };

      return instance;
    }

    function startVoiceInput() {
      if (locked) {
        return;
      }

      answerInput.focus();
      voiceBaseText = answerInput.value.trimEnd();

      if (!recognition) {
        recognition = buildRecognition();
      }

      setRecordingState(true);

      try {
        if (recognition) {
          recognition.start();
        } else {
          window.clearTimeout(fallbackTimer);
          fallbackTimer = window.setTimeout(() => setRecordingState(false), 1500);
        }
      } catch {
        window.clearTimeout(fallbackTimer);
        fallbackTimer = window.setTimeout(() => setRecordingState(false), 1500);
      }
    }

    function stopVoiceInput() {
      window.clearTimeout(fallbackTimer);

      if (recognition && recognizing) {
        try {
          recognition.stop();
        } catch {
          setRecordingState(false);
        }
      } else {
        setRecordingState(false);
      }
    }

    function resetForNextQuestion() {
      questionIndex = (questionIndex + 1) % questions.length;
      answerInput.value = "";
      renderQuestion(questions[questionIndex]);
      body.classList.remove("is-completing", "is-focused", "is-recording");
      surface.classList.remove("is-locked", "is-blank", "is-fading");
      answerInput.disabled = false;
      locked = false;
    }

    function submitAnswer() {
      if (locked || !answerInput.value.trim()) {
        return;
      }

      locked = true;
      answerInput.disabled = true;
      stopVoiceInput();
      body.classList.remove("is-focused", "is-recording");
      body.classList.add("is-completing");
      surface.classList.add("is-locked");

      window.setTimeout(() => {
        surface.classList.add("is-fading");
      }, 1000);

      window.setTimeout(() => {
        surface.classList.remove("is-fading");
        surface.classList.add("is-blank");
      }, 1780);

      window.setTimeout(resetForNextQuestion, 4780);
    }

    answerInput.addEventListener("focus", refreshFocusState);
    answerInput.addEventListener("blur", refreshFocusState);
    answerInput.addEventListener("keydown", (event) => {
      if (locked) {
        event.preventDefault();
        return;
      }

      if (event.key === "Enter" && !event.shiftKey && !event.isComposing) {
        event.preventDefault();
        submitAnswer();
      }
    });

    voiceButton.addEventListener("click", () => {
      if (recognizing) {
        stopVoiceInput();
      } else {
        startVoiceInput();
      }
    });

    renderQuestion(questions[questionIndex]);
  </script>
</body>
</html>
